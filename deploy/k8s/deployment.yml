apiVersion: apps/v1
kind: Deployment
metadata:
  name: detec-api
  namespace: detec
  labels:
    app: detec-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: detec-api
  template:
    metadata:
      labels:
        app: detec-api
    spec:
      containers:
        - name: api
          image: ghcr.io/owner/agentic-governance/detec-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 8001
              name: gateway
          envFrom:
            - configMapRef:
                name: detec-api-config
            - secretRef:
                name: detec-api-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 5
