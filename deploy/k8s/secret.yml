apiVersion: v1
kind: Secret
metadata:
  name: detec-api-secrets
  namespace: detec
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_WITH_OPENSSL_RAND_HEX_32_OUTPUT"
  SEED_ADMIN_EMAIL: "admin@example.com"
  SEED_ADMIN_PASSWORD: "REPLACE_WITH_STRONG_PASSWORD"
  ALLOWED_ORIGINS: "https://detec.example.com"
  DATABASE_URL: "postgresql://postgres:REPLACE_WITH_DB_PASSWORD@detec-postgres:5432/agentic_governance"
---
apiVersion: v1
kind: Secret
metadata:
  name: detec-postgres
  namespace: detec
type: Opaque
stringData:
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "REPLACE_WITH_STRONG_PASSWORD"
  POSTGRES_DB: "agentic_governance"
