# Development overrides (loaded automatically by docker compose).
# Remove or rename this file in production deployments.

services:
  db:
    ports:
      - "5432:5432"

  api:
    environment:
      DEBUG: "true"
    volumes:
      - ./api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
