name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install and build
        working-directory: dashboard
        run: |
          npm ci
          npm run build

  collector-tests:
    name: Collector Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install collector dependencies
        run: pip install -e ".[dev]"
      - name: Run collector tests
        run: python -m pytest collector/tests/ -x -q

  calibration-regression:
    name: Calibration Regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install collector dependencies
        run: pip install -e ".[dev]"
      - name: Run calibration replay harness
        run: python -m pytest collector/tests/test_calibration.py -v

  api-tests:
    name: API Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: agentic_governance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install API dependencies
        run: pip install -r api/requirements.txt
        working-directory: .
      - name: Run API tests
        working-directory: api
        env:
          DATABASE_URL: postgresql://postgres:testpassword@localhost:5432/agentic_governance_test
          JWT_SECRET: ci-test-secret-not-for-production
          SEED_ADMIN_PASSWORD: ci-test-password
        run: python -m pytest tests/ -x -q

  provider-tests:
    name: Provider Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install collector dependencies
        run: pip install -e ".[dev]"
      - name: Run native provider mock tests
        run: >-
          python -m pytest
          collector/tests/test_esf_provider.py
          collector/tests/test_etw_provider.py
          collector/tests/test_ebpf_provider.py
          collector/tests/test_provider_registry.py
          -v -q

  esf-helper-build:
    name: ESF Helper Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compile esf_helper
        run: make -C collector/providers/esf_helper
      - name: Verify binary exists
        run: test -f collector/providers/esf_helper/esf_helper
      - name: Upload esf_helper artifact
        uses: actions/upload-artifact@v4
        with:
          name: esf_helper-unsigned
          path: collector/providers/esf_helper/esf_helper
          retention-days: 7

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t detec-api:ci ./api
      - name: Build Dashboard image
        run: docker build -t detec-dashboard:ci ./dashboard
